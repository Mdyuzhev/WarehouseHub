# =============================================================================
# Kubernetes Profile Configuration
# =============================================================================
# Этот профиль активируется в K8s через переменную окружения:
# SPRING_PROFILES_ACTIVE=k8s

spring.datasource.url=jdbc:postgresql://postgres-service.warehouse.svc.cluster.local:5432/warehouse
spring.datasource.username=${DB_USERNAME:warehouse_user}
spring.datasource.password=${DB_PASSWORD:warehouse_secret_2025}

# =============================================================================
# JWT Configuration
# =============================================================================
jwt.secret=bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OTA=
jwt.expiration=86400000

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics,mappings,beans
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# =============================================================================
# Metrics Configuration
# =============================================================================
management.metrics.tags.application=warehouse-api
management.metrics.tags.environment=production

# Enable JVM metrics
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.http=true

# Database pool metrics
management.metrics.enable.hikaricp=true

# =============================================================================
# Logging
# =============================================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.warehouse=DEBUG