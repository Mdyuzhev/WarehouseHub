spring.application.name=warehouse-api
server.port=8082

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://192.168.1.74:5432/warehouse
spring.datasource.username=warehouse
spring.datasource.password=warehouse123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
