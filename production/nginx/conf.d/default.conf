# HTTP → HTTPS redirect
server {
    listen 80;
    server_name wh-lab.ru www.wh-lab.ru api.wh-lab.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend (wh-lab.ru)
server {
    listen 443 ssl;
    server_name wh-lab.ru www.wh-lab.ru;

    ssl_certificate /etc/letsencrypt/live/wh-lab.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wh-lab.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API (api.wh-lab.ru)
server {
    listen 443 ssl;
    server_name api.wh-lab.ru;

    ssl_certificate /etc/letsencrypt/live/wh-lab.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wh-lab.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Analytics API endpoints
    location /analytics/ {
        rewrite ^/analytics/(.*) /$1 break;
        proxy_pass http://analytics:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Analytics WebSocket
    location /analytics/ws {
        rewrite ^/analytics/ws /ws break;
        proxy_pass http://analytics:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Main API
    location / {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
