stages:
  - validate
  - build
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository/

before_script:
  - chmod +x ./mvnw

validate-project:
  stage: validate
  script:
    - echo "Validating project structure..."
    - ./mvnw validate --batch-mode
  tags:
    - shell

build-project:
  stage: build
  script:
    - echo "Building the project..."
    - ./mvnw compile --batch-mode
  tags:
    - shell

test-project:
  stage: test
  script:
    - echo "Running tests..."
    - ./mvnw test --batch-mode
  tags:
    - shell
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/*.xml