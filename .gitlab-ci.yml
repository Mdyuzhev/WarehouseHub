# =============================================================================
# CI Pipeline для warehouse-api
# Только сборка и публикация образа. Деплой - в warehouse-master!
# =============================================================================

stages:
  - validate
  - build
  - test
  - package

# =============================================================================
# Переменные
# =============================================================================
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  IMAGE_NAME: "warehouse-api"
  YC_REGISTRY: "cr.yandex/crpf5fukf1ili7kudopb"

# =============================================================================
# Кэширование Maven зависимостей
# =============================================================================
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/
    - target/

# =============================================================================
# Stage: validate
# =============================================================================
validate-project:
  stage: validate
  script:
    - echo "🔍 Validating project structure..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw validate --batch-mode
  tags:
    - shell

# =============================================================================
# Stage: build
# =============================================================================
build-project:
  stage: build
  script:
    - echo "🔨 Building application..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw compile --batch-mode
  artifacts:
    paths:
      - target/classes/
    expire_in: 1 hour
  tags:
    - shell

# =============================================================================
# Stage: test (Unit tests only)
# =============================================================================
test-project:
  stage: test
  script:
    - echo "🧪 Running unit tests..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw test --batch-mode -Dtest="!*E2E*"
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
    expire_in: 1 week
  tags:
    - shell

# =============================================================================
# Stage: package
# Сборка Docker образа и push в Yandex Registry
# =============================================================================
package-image:
  stage: package
  script:
    - echo "📦 Building JAR..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw package -DskipTests --batch-mode

    - echo "🐳 Building Docker image..."
    - docker build --no-cache -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $IMAGE_NAME:latest

    - echo "📤 Pushing to Yandex Container Registry..."
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $YC_REGISTRY/$IMAGE_NAME:latest
    - cat /home/flomaster/secrets/yc-registry-key.json | docker login --username json_key --password-stdin cr.yandex
    - docker push $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $YC_REGISTRY/$IMAGE_NAME:latest

    - echo "📦 Importing to K3s..."
    - docker save $IMAGE_NAME:latest -o /tmp/$IMAGE_NAME.tar
    - sudo k3s ctr images rm docker.io/library/$IMAGE_NAME:latest || true
    - sudo k3s ctr images import /tmp/$IMAGE_NAME.tar
    - sudo rm -f /tmp/$IMAGE_NAME.tar || true

    - echo "✅ Image ready! Deploy via warehouse-master"
  only:
    - main
  tags:
    - shell
