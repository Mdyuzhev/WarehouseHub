# =============================================================================
# Warehouse Master - Оркестрация деплоя и тестирования
# =============================================================================

# Чтобы pipeline не падал когда все jobs manual
workflow:
  rules:
    - when: always

stages:
  - init
  - deploy-staging
  - deploy-prod
  - test

# Фейковый job чтобы pipeline был "успешным" и показывал кнопки
pipeline-init:
  stage: init
  script:
    - echo "🎮 Pipeline ready! Click buttons below to run jobs."
  tags:
    - shell

# =============================================================================
# Переменные
# =============================================================================
variables:
  # Yandex Cloud Registry
  YC_REGISTRY: "cr.yandex/crpf5fukf1ili7kudopb"

  # K8s - используем kubeconfig flomaster'а
  KUBECONFIG: "/home/flomaster/.kube/config"
  K8S_NAMESPACE_APP: "warehouse"
  K8S_NAMESPACE_LOADTEST: "loadtest"
  K8S_NAMESPACE_NOTIFICATIONS: "notifications"

  # Production
  PROD_HOST: "130.193.44.34"
  PROD_USER: "ubuntu"

  # Locust
  LOCUST_MASTER_URL: "http://192.168.1.74:30089"

  # Allure
  ALLURE_SERVER_URL: "http://192.168.1.74:5050"

# =============================================================================
# DEPLOY STAGING
# =============================================================================

deploy-api-staging:
  stage: deploy-staging
  script:
    - echo "🚀 Deploying API to Staging..."
    - kubectl apply -f k8s/warehouse/api-configmap.yaml
    - kubectl apply -f k8s/warehouse/api-deployment.yaml
    - kubectl apply -f k8s/warehouse/api-service.yaml
    - kubectl rollout restart deployment/warehouse-api -n $K8S_NAMESPACE_APP
    - kubectl rollout status deployment/warehouse-api -n $K8S_NAMESPACE_APP --timeout=120s
    - echo "✅ API deployed to Staging"
  tags:
    - shell
  when: manual
  environment:
    name: staging-api
    url: http://192.168.1.74:30080

deploy-frontend-staging:
  stage: deploy-staging
  script:
    - echo "🚀 Deploying Frontend to Staging..."
    - kubectl apply -f k8s/warehouse/frontend-deployment.yaml
    - kubectl apply -f k8s/warehouse/frontend-service.yaml
    - kubectl rollout restart deployment/warehouse-frontend -n $K8S_NAMESPACE_APP
    - kubectl rollout status deployment/warehouse-frontend -n $K8S_NAMESPACE_APP --timeout=120s
    - echo "✅ Frontend deployed to Staging"
  tags:
    - shell
  when: manual
  environment:
    name: staging-frontend
    url: http://192.168.1.74:30081

deploy-all-staging:
  stage: deploy-staging
  script:
    - echo "🚀 Deploying ALL to Staging..."
    # API
    - kubectl apply -f k8s/warehouse/
    - kubectl rollout restart deployment/warehouse-api -n $K8S_NAMESPACE_APP
    - kubectl rollout restart deployment/warehouse-frontend -n $K8S_NAMESPACE_APP
    - kubectl rollout status deployment/warehouse-api -n $K8S_NAMESPACE_APP --timeout=120s
    - kubectl rollout status deployment/warehouse-frontend -n $K8S_NAMESPACE_APP --timeout=120s
    - echo "✅ All services deployed to Staging"
  tags:
    - shell
  when: manual
  environment:
    name: staging
    url: http://192.168.1.74:30080

# =============================================================================
# DEPLOY PRODUCTION
# =============================================================================

deploy-api-prod:
  stage: deploy-prod
  before_script:
    - mkdir -p ~/.ssh
    - cp /home/flomaster/.ssh/yc_prod_key ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      echo "🚀 Deploying API to Production..."
      ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
        cd /opt/warehouse
        sudo docker compose pull api
        sudo docker compose up -d api
        sudo docker image prune -f
        echo "✅ API deployed!"
      ENDSSH
  after_script:
    - rm -f ~/.ssh/deploy_key
  tags:
    - shell
  when: manual
  environment:
    name: production-api
    url: https://api.wh-lab.ru

deploy-frontend-prod:
  stage: deploy-prod
  before_script:
    - mkdir -p ~/.ssh
    - cp /home/flomaster/.ssh/yc_prod_key ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      echo "🚀 Deploying Frontend to Production..."
      ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
        cd /opt/warehouse
        sudo docker compose pull frontend
        sudo docker compose up -d frontend
        sudo docker image prune -f
        echo "✅ Frontend deployed!"
      ENDSSH
  after_script:
    - rm -f ~/.ssh/deploy_key
  tags:
    - shell
  when: manual
  environment:
    name: production-frontend
    url: https://wh-lab.ru

deploy-all-prod:
  stage: deploy-prod
  before_script:
    - mkdir -p ~/.ssh
    - cp /home/flomaster/.ssh/yc_prod_key ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      echo "🚀 Deploying ALL to Production..."
      ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
        cd /opt/warehouse
        sudo docker compose pull
        sudo docker compose up -d
        sudo docker image prune -f
        echo "✅ All services deployed!"
      ENDSSH
  after_script:
    - rm -f ~/.ssh/deploy_key
  tags:
    - shell
  when: manual
  environment:
    name: production
    url: https://wh-lab.ru

# =============================================================================
# TESTING
# =============================================================================

run-e2e-tests:
  stage: test
  variables:
    PROJECT_ID: "warehouse-api"
  script:
    - echo "🧪 Running API E2E tests..."
    - cd /home/flomaster/warehouse-api
    # Удаляем target с sudo чтобы избежать Permission denied
    - sudo rm -rf target/ || true
    - LD_PRELOAD= bash ./mvnw test --batch-mode -Dspring.profiles.active=test || true
    # Очистка предыдущих результатов
    - curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/projects" -H "Content-Type:application/json" -d "{\"id\":\"$PROJECT_ID\"}" || true
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    # Загрузка результатов файлами (tar.gz не работает корректно)
    - |
      if [ -d "target/allure-results" ]; then
        cd target/allure-results
        for f in *.json; do
          curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/send-results?project_id=$PROJECT_ID" -F "files[]=@$f" > /dev/null
        done
        cd ../..
      fi
    - sleep 2
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/generate-report?project_id=$PROJECT_ID"
    - echo ""
    - echo "═══════════════════════════════════════════════════════════"
    - echo "📊 E2E ALLURE REPORT:"
    - echo "   http://192.168.1.74:5252/#/projects/$PROJECT_ID"
    - echo "═══════════════════════════════════════════════════════════"
    # Исправление прав для локального запуска
    - chown -R flomaster:flomaster /home/flomaster/warehouse-api/target/ || true
  tags:
    - shell
  when: manual

# UI Tests for Staging environment
run-ui-tests-staging:
  stage: test
  variables:
    BASE_URL: "http://192.168.1.74:30081"
    SELENOID_URL: "http://192.168.1.74:4444/wd/hub"
    PROJECT_ID: "warehouse-ui-staging"
  script:
    - echo "🎭 Running UI Tests on STAGING..."
    - echo "🌐 Target: $BASE_URL"
    # Автоматически поднимаем Selenoid если не запущен
    - |
      if ! curl -s "http://192.168.1.74:4444/status" | grep -q "total"; then
        echo "🚀 Starting Selenoid..."
        cd /home/flomaster/warehouse-master/selenoid && docker-compose up -d
        sleep 10
      fi
    - echo "✅ Selenoid is ready!"
    # Очистка предыдущих результатов
    - curl -s -X DELETE "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    # Запуск тестов
    - cd /home/flomaster/warehouse-master/ui-tests
    - sudo rm -rf target/ || true
    - |
      /home/flomaster/warehouse-master/ui-tests/mvnw test \
        -Dbase.url=$BASE_URL \
        -Dselenoid.url=$SELENOID_URL \
        -Dbrowser=chrome \
        -Dbrowser.size=1920x1080 \
        --batch-mode || true
    # Загрузка результатов в Allure
    - curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/projects" -H "Content-Type:application/json" -d "{\"id\":\"$PROJECT_ID\"}" || true
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    - |
      if [ -d "/home/flomaster/warehouse-master/ui-tests/target/allure-results" ]; then
        cd /home/flomaster/warehouse-master/ui-tests/target/allure-results
        for f in *.json; do
          curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/send-results?project_id=$PROJECT_ID" -F "files[]=@$f" > /dev/null
        done
      fi
    - sleep 2
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/generate-report?project_id=$PROJECT_ID"
    - echo ""
    - echo "═══════════════════════════════════════════════════════════"
    - echo "📊 STAGING ALLURE REPORT:"
    - echo "   http://192.168.1.74:5252/#/projects/$PROJECT_ID"
    - echo "═══════════════════════════════════════════════════════════"
    # Исправление прав для локального запуска
    - chown -R flomaster:flomaster /home/flomaster/warehouse-master/ui-tests/target/ || true
  tags:
    - shell
  when: manual
  environment:
    name: test-staging
    url: http://192.168.1.74:30081

