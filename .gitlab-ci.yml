# =============================================================================
# Warehouse Master - Оркестрация деплоя и тестирования
# =============================================================================

# Чтобы pipeline не падал когда все jobs manual
workflow:
  rules:
    - when: always

stages:
  - init
  - deploy-staging
  - deploy-prod
  - sync-github
  - test

# Фейковый job чтобы pipeline был "успешным" и показывал кнопки
pipeline-init:
  stage: init
  script:
    - echo "🎮 Pipeline ready! Click buttons below to run jobs."
  tags:
    - shell

# =============================================================================
# Переменные
# =============================================================================
variables:
  # Yandex Cloud Registry
  YC_REGISTRY: "cr.yandex/crpf5fukf1ili7kudopb"

  # K8s - используем kubeconfig flomaster'а
  KUBECONFIG: "/home/flomaster/.kube/config"
  K8S_NAMESPACE_APP: "warehouse"
  K8S_NAMESPACE_LOADTEST: "loadtest"
  K8S_NAMESPACE_NOTIFICATIONS: "notifications"

  # Staging Server (local K3s)
  STAGING_HOST: "192.168.1.74"
  STAGING_API_PORT: "30080"
  STAGING_FRONTEND_PORT: "30081"
  STAGING_API_DEV_PORT: "31080"
  STAGING_FRONTEND_DEV_PORT: "31081"

  # Production (Yandex Cloud) - host from CI/CD variable $PROD_HOST
  PROD_USER: "ubuntu"

  # Service URLs (computed from STAGING_HOST)
  LOCUST_MASTER_URL: "http://${STAGING_HOST}:30089"
  ALLURE_SERVER_URL: "http://${STAGING_HOST}:5050"
  SELENOID_URL: "http://${STAGING_HOST}:4444/wd/hub"

  # Image versioning (#14: use git SHA instead of :latest)
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA:-latest}"

# =============================================================================
# TEMPLATES (reusable job definitions)
# =============================================================================

# Template for SSH deploy to production
.prod-ssh-template:
  before_script:
    - mkdir -p ~/.ssh
    - echo "$PROD_SSH_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts 2>/dev/null
  after_script:
    - rm -f ~/.ssh/deploy_key
  tags:
    - shell
  when: manual

# Template for Allure report upload
.allure-upload-template:
  script:
    - curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/projects" -H "Content-Type:application/json" -d "{\"id\":\"$PROJECT_ID\"}" || true
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    - bash -c 'cd $ALLURE_RESULTS_DIR 2>/dev/null && for f in *; do [ -f "$f" ] && curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/send-results?project_id=$PROJECT_ID" -F "files[]=@$f" >/dev/null; done' || true
    - sleep 2
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/generate-report?project_id=$PROJECT_ID"

# Template for E2E tests
.e2e-test-template:
  stage: test
  script:
    - echo "🧪 Running E2E Tests on $TEST_ENV..."
    - echo "Target URL - $BASE_URL"
    - cd /home/flomaster/warehouse-master/e2e-tests
    - rm -rf target/ || true
    - ./mvnw test -Dbase.url=$BASE_URL --batch-mode || true
    # Upload to Allure
    - export ALLURE_RESULTS_DIR=/home/flomaster/warehouse-master/e2e-tests/target/allure-results
    - curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/projects" -H "Content-Type:application/json" -d "{\"id\":\"$PROJECT_ID\"}" || true
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    - bash -c 'cd $ALLURE_RESULTS_DIR 2>/dev/null && for f in *; do [ -f "$f" ] && curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/send-results?project_id=$PROJECT_ID" -F "files[]=@$f" >/dev/null; done' || true
    - sleep 2
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/generate-report?project_id=$PROJECT_ID"
    - echo ""
    - echo "═══════════════════════════════════════════════════════════"
    - echo "📊 E2E $TEST_ENV ALLURE REPORT:"
    - echo "   ${ALLURE_SERVER_URL}/allure-docker-service/projects/$PROJECT_ID/reports/latest"
    - echo "═══════════════════════════════════════════════════════════"
  tags:
    - shell
  when: manual

# Template for UI tests
.ui-test-template:
  stage: test
  script:
    - echo "🎭 Running UI Tests on $TEST_ENV..."
    - echo "Target URL - $BASE_URL"
    # Start Selenoid if not running
    - bash -c 'curl -s "http://${STAGING_HOST}:4444/status" | grep -q "total" || (cd /home/flomaster/warehouse-master/selenoid && docker-compose up -d && sleep 10)'
    - echo "✅ Selenoid is ready!"
    # Clean previous results
    - curl -s -X DELETE "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    # Run tests
    - cd /home/flomaster/warehouse-master/ui-tests
    - sudo rm -rf target/ || true
    - /home/flomaster/warehouse-master/ui-tests/mvnw test -Dbase.url=$BASE_URL -Dselenoid.url=$SELENOID_URL -Dbrowser=chrome -Dbrowser.size=1920x1080 --batch-mode || true
    # Upload to Allure
    - export ALLURE_RESULTS_DIR=/home/flomaster/warehouse-master/ui-tests/target/allure-results
    - curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/projects" -H "Content-Type:application/json" -d "{\"id\":\"$PROJECT_ID\"}" || true
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    - bash -c 'cd $ALLURE_RESULTS_DIR 2>/dev/null && for f in *; do [ -f "$f" ] && curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/send-results?project_id=$PROJECT_ID" -F "files[]=@$f" >/dev/null; done' || true
    - sleep 2
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/generate-report?project_id=$PROJECT_ID"
    - echo ""
    - echo "═══════════════════════════════════════════════════════════"
    - echo "📊 $TEST_ENV ALLURE REPORT:"
    - echo "   http://${STAGING_HOST}:5252/#/projects/$PROJECT_ID"
    - echo "═══════════════════════════════════════════════════════════"
    # Fix permissions
    - chown -R flomaster:flomaster /home/flomaster/warehouse-master/ui-tests/target/ || true
  tags:
    - shell
  when: manual

# =============================================================================
# DEPLOY STAGING
# =============================================================================

deploy-api-staging:
  stage: deploy-staging
  script:
    - echo "🚀 Deploying API to Staging..."
    - kubectl apply -f k8s/warehouse/api-configmap.yaml
    - kubectl apply -f k8s/warehouse/api-deployment.yaml
    - kubectl apply -f k8s/warehouse/api-service.yaml
    - kubectl rollout restart deployment/warehouse-api -n $K8S_NAMESPACE_APP
    - kubectl rollout status deployment/warehouse-api -n $K8S_NAMESPACE_APP --timeout=120s
    - echo "✅ API deployed to Staging"
  tags:
    - shell
  when: manual
  environment:
    name: staging-api
    url: http://${STAGING_HOST}:${STAGING_API_PORT}

deploy-frontend-staging:
  stage: deploy-staging
  script:
    - echo "🚀 Deploying Frontend to Staging..."
    - kubectl apply -f k8s/warehouse/frontend-deployment.yaml
    - kubectl apply -f k8s/warehouse/frontend-service.yaml
    - kubectl rollout restart deployment/warehouse-frontend -n $K8S_NAMESPACE_APP
    - kubectl rollout status deployment/warehouse-frontend -n $K8S_NAMESPACE_APP --timeout=120s
    - echo "✅ Frontend deployed to Staging"
  tags:
    - shell
  when: manual
  environment:
    name: staging-frontend
    url: http://${STAGING_HOST}:${STAGING_FRONTEND_PORT}

deploy-all-staging:
  stage: deploy-staging
  script:
    - echo "🚀 Deploying ALL to Staging..."
    # API
    - kubectl apply -f k8s/warehouse/
    - kubectl rollout restart deployment/warehouse-api -n $K8S_NAMESPACE_APP
    - kubectl rollout restart deployment/warehouse-frontend -n $K8S_NAMESPACE_APP
    - kubectl rollout status deployment/warehouse-api -n $K8S_NAMESPACE_APP --timeout=120s
    - kubectl rollout status deployment/warehouse-frontend -n $K8S_NAMESPACE_APP --timeout=120s
    - echo "✅ All services deployed to Staging"
  tags:
    - shell
  when: manual
  environment:
    name: staging
    url: http://${STAGING_HOST}:${STAGING_API_PORT}

# =============================================================================
# DEPLOY PRODUCTION
# =============================================================================

deploy-api-prod:
  extends: .prod-ssh-template
  stage: deploy-prod
  script:
    - |
      echo "🚀 Deploying API to Production..."
      ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
        cd /opt/warehouse
        sudo docker compose pull api
        sudo docker compose up -d api
        sudo docker image prune -f
        echo "✅ API deployed!"
      ENDSSH
  environment:
    name: production-api
    url: https://api.wh-lab.ru

deploy-frontend-prod:
  extends: .prod-ssh-template
  stage: deploy-prod
  script:
    - |
      echo "🚀 Deploying Frontend to Production..."
      ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
        cd /opt/warehouse
        sudo docker compose pull frontend
        sudo docker compose up -d frontend
        sudo docker image prune -f
        echo "✅ Frontend deployed!"
      ENDSSH
  environment:
    name: production-frontend
    url: https://wh-lab.ru

deploy-all-prod:
  extends: .prod-ssh-template
  stage: deploy-prod
  script:
    - |
      echo "🚀 Deploying ALL to Production..."
      ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
        cd /opt/warehouse
        sudo docker compose pull
        sudo docker compose up -d
        sudo docker image prune -f
        echo "✅ All services deployed!"
      ENDSSH
  environment:
    name: production
    url: https://wh-lab.ru

# =============================================================================
# SYNC TO GITHUB (triggers cloud deploy)
# =============================================================================

sync-to-github:
  stage: sync-github
  variables:
    GITHUB_REPO: "https://github.com/Mdyuzhev/WaregouseHub.git"
  script:
    - echo "🔄 Syncing to GitHub..."
    - |
      # Configure git
      git config --global user.email "gitlab-ci@warehouse.local"
      git config --global user.name "GitLab CI"

      # Add GitHub remote if not exists
      git remote get-url github 2>/dev/null || git remote add github "https://${GITHUB_TOKEN}@github.com/Mdyuzhev/WaregouseHub.git"

      # Update remote URL with token
      git remote set-url github "https://${GITHUB_TOKEN}@github.com/Mdyuzhev/WaregouseHub.git"

      # Push to GitHub (triggers GitHub Actions -> Yandex Cloud)
      git push github HEAD:main --force

      echo "✅ Pushed to GitHub!"
      echo "🚀 GitHub Actions will now deploy to Yandex Cloud"
      echo "   Check: https://github.com/Mdyuzhev/WaregouseHub/actions"
  tags:
    - shell
  when: manual
  needs:
    - job: deploy-all-prod
      optional: true

# Auto-sync after any prod deploy
sync-to-github-auto:
  stage: sync-github
  variables:
    GITHUB_REPO: "https://github.com/Mdyuzhev/WaregouseHub.git"
  script:
    - echo "🔄 Auto-syncing to GitHub after prod deploy..."
    - |
      git config --global user.email "gitlab-ci@warehouse.local"
      git config --global user.name "GitLab CI"
      git remote set-url github "https://${GITHUB_TOKEN}@github.com/Mdyuzhev/WaregouseHub.git" 2>/dev/null || \
        git remote add github "https://${GITHUB_TOKEN}@github.com/Mdyuzhev/WaregouseHub.git"
      git push github HEAD:main --force
      echo "✅ Synced to GitHub -> Cloud deploy triggered"
  tags:
    - shell
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
  needs:
    - job: deploy-all-prod
      optional: true
    - job: deploy-api-prod
      optional: true
    - job: deploy-frontend-prod
      optional: true

# =============================================================================
# TESTING
# =============================================================================

# E2E Tests for Staging environment
run-e2e-tests-staging:
  extends: .e2e-test-template
  variables:
    BASE_URL: "http://${STAGING_HOST}:${STAGING_API_PORT}"
    PROJECT_ID: "e2e-staging"
    TEST_ENV: "STAGING"
  environment:
    name: e2e-test-staging
    url: http://${STAGING_HOST}:${STAGING_API_PORT}

# E2E Tests for Production environment
run-e2e-tests-prod:
  extends: .e2e-test-template
  variables:
    BASE_URL: "https://api.wh-lab.ru"
    PROJECT_ID: "e2e-prod"
    TEST_ENV: "PRODUCTION"
  environment:
    name: e2e-test-production
    url: https://api.wh-lab.ru

# UI Tests for Staging environment
run-ui-tests-staging:
  extends: .ui-test-template
  variables:
    BASE_URL: "http://${STAGING_HOST}:${STAGING_FRONTEND_PORT}"
    PROJECT_ID: "ui-staging"
    TEST_ENV: "STAGING"
  environment:
    name: test-staging
    url: http://${STAGING_HOST}:${STAGING_FRONTEND_PORT}

# UI Tests for Production environment
run-ui-tests-prod:
  extends: .ui-test-template
  variables:
    BASE_URL: "https://wh-lab.ru"
    PROJECT_ID: "ui-prod"
    TEST_ENV: "PRODUCTION"
  environment:
    name: test-production
    url: https://wh-lab.ru

run-load-tests:
  stage: test
  variables:
    TARGET_HOST: "http://warehouse-api-service.warehouse.svc.cluster.local:8080"
    USERS: "100"
    SPAWN_RATE: "10"
    DURATION: "300"
  script:
    - echo "🔥 Starting Load Test..."
    - echo "Target $TARGET_HOST, Users $USERS, Duration $DURATION sec"
    - |
      # Запуск теста
      curl -X POST "$LOCUST_MASTER_URL/swarm" \
        -d "user_count=$USERS&spawn_rate=$SPAWN_RATE&host=$TARGET_HOST"

      echo "⏳ Test running for ${DURATION}s..."
      sleep $DURATION

      # Остановка и получение результатов
      curl -X GET "$LOCUST_MASTER_URL/stop"

      echo "📊 Fetching results..."
      curl -s "$LOCUST_MASTER_URL/stats/requests" | jq '.stats[] | select(.name == "Aggregated")'
    - echo "✅ Load test completed"
  tags:
    - shell
  when: manual

# =============================================================================
# TELEGRAM BOT
# =============================================================================

deploy-telegram-bot:
  stage: deploy-staging
  script:
    - echo "🤖 Deploying Telegram Bot ($IMAGE_TAG)..."
    - cd telegram-bot
    - docker build -t gitlab-telegram-bot:$IMAGE_TAG .
    - docker save gitlab-telegram-bot:$IMAGE_TAG -o /tmp/bot.tar
    - sudo k3s ctr images rm docker.io/library/gitlab-telegram-bot:$IMAGE_TAG 2>/dev/null || true
    - sudo k3s ctr images import /tmp/bot.tar
    - rm /tmp/bot.tar
    - kubectl apply -f ../k8s/notifications/
    - kubectl rollout restart deployment/gitlab-telegram-bot -n $K8S_NAMESPACE_NOTIFICATIONS
    - kubectl rollout status deployment/gitlab-telegram-bot -n $K8S_NAMESPACE_NOTIFICATIONS --timeout=60s
    - echo "✅ Telegram Bot deployed (version $IMAGE_TAG)"
  tags:
    - shell
  when: manual

# =============================================================================
# ORCHESTRATOR UI (8-bit console)
# =============================================================================

deploy-orchestrator-ui:
  stage: deploy-staging
  script:
    - echo "🎮 Deploying Orchestrator UI..."
    - cd orchestrator-ui
    - docker-compose down || true
    - docker-compose up -d --build
    - sleep 5
    - |
      if curl -s http://localhost:8000/health | grep -q "ok"; then
        echo "✅ Orchestrator UI deployed! 🕹️"
        echo "🌐 URL: http://${STAGING_HOST}:8000"
      else
        echo "❌ Health check failed!"
        docker-compose logs
        exit 1
      fi
  tags:
    - shell
  when: manual
  environment:
    name: staging-ui
    url: http://${STAGING_HOST}:8000
