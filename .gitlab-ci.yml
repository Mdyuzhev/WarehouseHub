# =============================================================================
# CI/CD Pipeline для warehouse-api
# Полный цикл: validate → build → test → e2e-test → report → image → deploy → push-prod → deploy-prod → load-test
# =============================================================================

stages:
  - validate
  - build
  - test
  - e2e-test
  - report
  - image
  - deploy
  - push-prod
  - deploy-prod
  - load-test

# =============================================================================
# Переменные
# =============================================================================
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "-B -DskipTests"
  IMAGE_NAME: "warehouse-api"
  IMAGE_TAG: "latest"
  K8S_NAMESPACE: "warehouse"
  ALLURE_RESULTS: "target/allure-results"
  # Yandex Cloud Production
  YC_REGISTRY: "cr.yandex/crpf5fukf1ili7kudopb"
  PROD_HOST: "130.193.44.34"
  PROD_USER: "ubuntu"

# =============================================================================
# Кэширование Maven зависимостей
# =============================================================================
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/
    - target/

# =============================================================================
# Stage: validate
# =============================================================================
validate-project:
  stage: validate
  script:
    - echo "Validating project structure..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw validate --batch-mode
  tags:
    - shell

# =============================================================================
# Stage: build
# =============================================================================
build-project:
  stage: build
  script:
    - echo "Building application..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw compile --batch-mode
  artifacts:
    paths:
      - target/classes/
    expire_in: 1 hour
  tags:
    - shell

# =============================================================================
# Stage: test (Unit tests only)
# =============================================================================
test-project:
  stage: test
  script:
    - echo "Running unit tests..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw test --batch-mode -Dtest="!*E2E*"
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
    expire_in: 1 week
  tags:
    - shell

# =============================================================================
# Stage: e2e-test (E2E tests with Allure)
# =============================================================================
e2e-test:
  stage: e2e-test
  script:
    - echo "Running E2E tests..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw test --batch-mode -Dtest="*E2ETest" -Dspring.profiles.active=test
  artifacts:
    when: always
    paths:
      - target/allure-results/
      - target/surefire-reports/
    expire_in: 1 week
  tags:
    - shell
  allow_failure: false

# =============================================================================
# Stage: report (Upload to Allure server)
# =============================================================================
allure-report:
  stage: report
  script:
    - |
      echo "Uploading results to Allure server..."

      # Создаём project если не существует
      curl -X POST "http://192.168.1.74:5050/allure-docker-service/projects" \
        -H "Content-Type: application/json" \
        -d '{"id": "warehouse-api"}' || true

      # Очищаем предыдущие results
      curl -X DELETE "http://192.168.1.74:5050/allure-docker-service/clean-results?project_id=warehouse-api" || true

      # Загружаем новые results
      if [ -d "target/allure-results" ] && [ "$(ls -A target/allure-results 2>/dev/null)" ]; then
        echo "Found allure results, uploading..."
        for file in target/allure-results/*; do
          if [ -f "$file" ]; then
            curl -X POST "http://192.168.1.74:5050/allure-docker-service/send-results?project_id=warehouse-api" \
              -F "files[]=@$file"
          fi
        done

        # Генерируем отчёт
        curl -X GET "http://192.168.1.74:5050/allure-docker-service/generate-report?project_id=warehouse-api"

        echo ""
        echo "========================================="
        echo "Allure Report: http://192.168.1.74:5050/allure-docker-service/projects/warehouse-api/reports/latest"
        echo "Allure UI: http://192.168.1.74:5252"
        echo "========================================="
      else
        echo "No allure results found"
      fi
  dependencies:
    - e2e-test
  tags:
    - shell
  when: always

# =============================================================================
# Stage: image
# Сборка Docker образа и импорт в K3s containerd
# =============================================================================
build-image:
  stage: image
  script:
    - echo "Cleaning up old tar files..."
    - sudo rm -f /tmp/warehouse-api*.tar || true

    - echo "Building Docker image (no cache)..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw package -DskipTests --batch-mode
    - docker build --no-cache -t $IMAGE_NAME:$IMAGE_TAG .

    - echo "Exporting image for K3s with unique name..."
    - docker save $IMAGE_NAME:$IMAGE_TAG -o /tmp/$IMAGE_NAME-$CI_COMMIT_SHORT_SHA.tar

    - echo "Removing old image from K3s..."
    - sudo k3s ctr images rm docker.io/library/$IMAGE_NAME:$IMAGE_TAG || true

    - echo "Importing image into K3s containerd..."
    - sudo k3s ctr images import /tmp/$IMAGE_NAME-$CI_COMMIT_SHORT_SHA.tar

    - echo "Cleaning up temp file..."
    - sudo rm -f /tmp/$IMAGE_NAME-$CI_COMMIT_SHORT_SHA.tar || true

    - echo "Image imported successfully!"
    - sudo k3s ctr images list | grep $IMAGE_NAME
  only:
    - main
  tags:
    - shell

# =============================================================================
# Stage: deploy
# Деплой в Kubernetes
# =============================================================================
deploy-k8s:
  stage: deploy
  script:
    - echo "Deploying to Kubernetes namespace $K8S_NAMESPACE..."
    - export KUBECONFIG=~/.kube/config

    - echo "Applying manifests..."
    - kubectl apply -f k8s/configmap.yaml
    - kubectl apply -f k8s/deployment.yaml
    - kubectl apply -f k8s/service.yaml

    - echo "Restarting deployment to pull new image..."
    - kubectl rollout restart deployment/warehouse-api -n $K8S_NAMESPACE

    - echo "Waiting for rollout to complete..."
    - kubectl rollout status deployment/warehouse-api -n $K8S_NAMESPACE --timeout=120s

    - echo "Deployment successful!"
    - kubectl get pods -n $K8S_NAMESPACE -l app=warehouse-api

    - echo "Verifying health endpoint..."
    - sleep 10
    - "curl -sf http://localhost:30080/actuator/health || echo 'Health check pending...'"
  only:
    - main
  tags:
    - shell
  environment:
    name: production
    url: http://192.168.1.74:30080/swagger-ui.html

# =============================================================================
# Stage: push-prod
# Push Docker образа в Yandex Container Registry
# =============================================================================
push-prod:
  stage: push-prod
  script:
    - echo "Tagging image for Yandex Container Registry..."
    - docker tag $IMAGE_NAME:$IMAGE_TAG $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker tag $IMAGE_NAME:$IMAGE_TAG $YC_REGISTRY/$IMAGE_NAME:latest

    - echo "Logging into Yandex Container Registry..."
    - cat /home/flomaster/secrets/yc-registry-key.json | docker login --username json_key --password-stdin cr.yandex

    - echo "Pushing images..."
    - docker push $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $YC_REGISTRY/$IMAGE_NAME:latest

    - echo "Push completed successfully!"
  only:
    - main
  tags:
    - shell
  dependencies:
    - build-image

# =============================================================================
# Stage: deploy-prod
# Деплой на Production сервер в Yandex Cloud
# =============================================================================
deploy-prod:
  stage: deploy-prod
  before_script:
    - mkdir -p ~/.ssh
    - cp /home/flomaster/.ssh/yc_prod_key ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      echo "Deploying to Production ($PROD_HOST)..."
      ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
        cd /opt/warehouse
        echo "Pulling latest API image..."
        sudo docker compose pull api
        echo "Restarting API container..."
        sudo docker compose up -d api
        sudo docker image prune -f
        echo "API deployed successfully!"
        docker ps | grep warehouse-api
      ENDSSH
    - echo "Production deployment completed!"
  after_script:
    - rm -f ~/.ssh/deploy_key
  only:
    - main
  tags:
    - shell
  environment:
    name: production
    url: https://api.wh-lab.ru
  dependencies:
    - push-prod

# =============================================================================
# Stage: load-test
# Нагрузочное тестирование через Locust (потому что надо знать, когда API сдастся)
# =============================================================================
load-test:
  stage: load-test
  variables:
    LOCUST_HOST: "http://192.168.1.74:30089"
    TARGET_HOST: "http://warehouse-api-service.warehouse.svc.cluster.local:8080"
    USERS: "100"
    SPAWN_RATE: "10"
    DURATION: "900"  # 15 минут - хватит времени на пару чашек кофе
  script:
    - echo "=============================================="
    - echo "   Время проверить, на что способен наш API!"
    - echo "   Готовьте попкорн, будет интересно..."
    - echo "=============================================="
    - chmod +x ./scripts/load-test.sh
    - ./scripts/load-test.sh
  artifacts:
    when: always
    paths:
      - target/load-test-results/
    expire_in: 1 week
  only:
    - main
  tags:
    - shell
  when: manual  # Ручной запуск - нагрузочное тестирование не для каждого коммита
  allow_failure: true  # Не ломаем pipeline если API не выдержал - просто грустим
