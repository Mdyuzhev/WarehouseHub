# =============================================================================
# Selenoid - Docker-based Selenium Grid
# Запуск UI тестов в изолированных контейнерах браузеров
# =============================================================================
#
# Использование:
#   cd selenoid && docker-compose up -d
#
# UI: http://192.168.1.74:8090 (Selenoid UI)
# API: http://192.168.1.74:4444/wd/hub
# =============================================================================

version: "3.8"

services:
  selenoid:
    image: aerokube/selenoid:1.11.2
    container_name: selenoid
    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/etc/selenoid:ro
      - ./video:/opt/selenoid/video
      - ./logs:/opt/selenoid/logs
    environment:
      - OVERRIDE_VIDEO_OUTPUT_DIR=/opt/selenoid/video
    command:
      - "-conf"
      - "/etc/selenoid/browsers.json"
      - "-limit"
      - "4"
      - "-video-output-dir"
      - "/opt/selenoid/video"
      - "-log-output-dir"
      - "/opt/selenoid/logs"
    restart: unless-stopped

  selenoid-ui:
    image: aerokube/selenoid-ui:1.10.11
    container_name: selenoid-ui
    ports:
      - "8090:8080"
    command:
      - "--selenoid-uri"
      - "http://selenoid:4444"
    depends_on:
      - selenoid
    restart: unless-stopped
