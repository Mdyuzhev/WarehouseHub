name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'analytics-service/**'
      - 'telegram-bot/**'
      - 'production/**'
      - 'docker-compose*.yml'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - frontend

env:
  PROD_PATH: /opt/warehouse

