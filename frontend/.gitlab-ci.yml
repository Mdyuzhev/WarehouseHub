# =============================================================================
# CI Pipeline для warehouse-frontend (Vue.js + Nginx)
# Сборка, публикация образа и деплой в dev/prod окружения
# =============================================================================

stages:
  - test
  - build
  - package
  - deploy

# =============================================================================
# Переменные
# =============================================================================
variables:
  IMAGE_NAME: "warehouse-frontend"
  YC_REGISTRY: "cr.yandex/crpf5fukf1ili7kudopb"
  # K8s config для деплоя
  KUBECONFIG: "/home/flomaster/.kube/config"
  # Dev environment (warehouse-dev namespace, порты 31xxx)
  DEV_NAMESPACE: "warehouse-dev"
  DEV_FRONTEND_URL: "http://192.168.1.74:31081"
  # Prod environment (warehouse namespace, порты 30xxx)
  PROD_NAMESPACE: "warehouse"
  PROD_FRONTEND_URL: "http://192.168.1.74:30081"

# =============================================================================
# Stage: test (lint + unit tests)
# =============================================================================
test-and-lint:
  stage: test
  script:
    - echo "📦 Installing dependencies..."
    - npm ci
    - echo "🔍 Running ESLint..."
    - npm run lint || true
    - echo "🧪 Running unit tests..."
    - npm test
  artifacts:
    when: always
    paths:
      - node_modules/
    expire_in: 1 hour
  tags:
    - shell

# =============================================================================
# Stage: build
# Сборка Docker образа (multi-stage: node → nginx)
# =============================================================================
build-image:
  stage: build
  script:
    - echo "🔨 Building Docker image..."
    - docker build --no-cache -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $IMAGE_NAME:latest
    - echo "✅ Build completed"
    - docker images | grep $IMAGE_NAME || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  tags:
    - shell

# =============================================================================
# Stage: package
# Push в Registry и импорт в K3s
# =============================================================================
package-image:
  stage: package
  script:
    - echo "📤 Pushing to Yandex Container Registry..."
    - docker tag $IMAGE_NAME:latest $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker tag $IMAGE_NAME:latest $YC_REGISTRY/$IMAGE_NAME:latest
    - cat /home/flomaster/secrets/yc-registry-key.json | docker login --username json_key --password-stdin cr.yandex
    - docker push $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $YC_REGISTRY/$IMAGE_NAME:latest

    - echo "📦 Importing to K3s..."
    - sudo k3s ctr images rm docker.io/library/$IMAGE_NAME:latest || true
    - docker save $IMAGE_NAME:latest | sudo k3s ctr images import --all-platforms -

    - echo "✅ Image ready for deployment"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  tags:
    - shell
  dependencies:
    - build-image

# =============================================================================
# Stage: deploy
# Деплой в dev (автоматически) и prod (ручной триггер)
# =============================================================================

# Автоматический деплой в dev-окружение при пуше в develop
deploy-dev:
  stage: deploy
  script:
    - echo "Deploying Frontend to DEV environment..."
    - echo "Namespace - $DEV_NAMESPACE"
    - kubectl rollout restart deployment/warehouse-frontend -n $DEV_NAMESPACE
    - kubectl rollout status deployment/warehouse-frontend -n $DEV_NAMESPACE --timeout=120s
    - echo "Checking availability..."
    - sleep 5
    - curl -sf "$DEV_FRONTEND_URL" -o /dev/null && echo "Frontend available" || echo "Frontend check warning"
    - echo "DEV URL - $DEV_FRONTEND_URL"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  environment:
    name: development
    url: $DEV_FRONTEND_URL
  tags:
    - shell
  dependencies:
    - package-image

# Ручной деплой в prod-окружение при пуше в main
deploy-prod:
  stage: deploy
  script:
    - echo "Deploying Frontend to PRODUCTION environment..."
    - echo "Namespace - $PROD_NAMESPACE"
    - kubectl rollout restart deployment/warehouse-frontend -n $PROD_NAMESPACE
    - kubectl rollout status deployment/warehouse-frontend -n $PROD_NAMESPACE --timeout=120s
    - echo "Checking availability..."
    - sleep 5
    - curl -sf "$PROD_FRONTEND_URL" -o /dev/null && echo "Frontend available" || echo "Frontend check warning"
    - echo "PROD URL - $PROD_FRONTEND_URL"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: $PROD_FRONTEND_URL
  tags:
    - shell
  dependencies:
    - package-image
