# WH-106: ConfigMap для режима Baseline (без Redis/Kafka)
# Применить: kubectl apply -f api-baseline.yaml
# Для переключения: kubectl set env deployment/warehouse-api -n warehouse --from=configmap/api-baseline

apiVersion: v1
kind: ConfigMap
metadata:
  name: api-baseline
  namespace: warehouse
  labels:
    app: warehouse-api
    mode: baseline
data:
  # Отключаем Redis кэширование
  SPRING_CACHE_TYPE: "none"
  # Kafka не указан - значит отключена
