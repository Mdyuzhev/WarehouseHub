# =============================================================================
# Warehouse Testing - CI/CD Pipeline
# =============================================================================

workflow:
  rules:
    - when: always

stages:
  - init
  - test

# =============================================================================
# Variables
# =============================================================================
variables:
  # Staging Server
  STAGING_HOST: "192.168.1.74"
  STAGING_API_PORT: "30080"
  STAGING_FRONTEND_PORT: "30081"
  STAGING_API_DEV_PORT: "31080"
  STAGING_FRONTEND_DEV_PORT: "31081"

  # Service URLs
  ALLURE_SERVER_URL: "http://${STAGING_HOST}:5050"
  SELENOID_URL: "http://${STAGING_HOST}:4444/wd/hub"
  LOCUST_MASTER_URL: "http://${STAGING_HOST}:30089"

# =============================================================================
# Templates
# =============================================================================

.e2e-test-template:
  stage: test
  script:
    - echo "Running E2E Tests on $TEST_ENV..."
    - cd e2e-tests
    - rm -rf target/ || true
    - ./mvnw test -Dbase.url=$BASE_URL --batch-mode || true
    # Upload to Allure
    - curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/projects" -H "Content-Type:application/json" -d "{\"id\":\"$PROJECT_ID\"}" || true
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    - bash -c 'cd target/allure-results 2>/dev/null && for f in *; do [ -f "$f" ] && curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/send-results?project_id=$PROJECT_ID" -F "files[]=@$f" >/dev/null; done' || true
    - sleep 2
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/generate-report?project_id=$PROJECT_ID"
    - echo "Report: ${ALLURE_SERVER_URL}/allure-docker-service/projects/$PROJECT_ID/reports/latest"
  tags:
    - shell
  when: manual

.ui-test-template:
  stage: test
  script:
    - echo "Running UI Tests on $TEST_ENV..."
    # Start Selenoid if needed
    - bash -c 'curl -s "http://${STAGING_HOST}:4444/status" | grep -q "total" || (cd infrastructure/selenoid && docker-compose up -d && sleep 10)'
    - cd ui-tests
    - sudo rm -rf target/ || true
    - ./mvnw test -Dbase.url=$BASE_URL -Dselenoid.url=$SELENOID_URL -Dbrowser=chrome -Dbrowser.size=1920x1080 --batch-mode || true
    # Upload to Allure
    - curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/projects" -H "Content-Type:application/json" -d "{\"id\":\"$PROJECT_ID\"}" || true
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/clean-results?project_id=$PROJECT_ID" || true
    - bash -c 'cd target/allure-results 2>/dev/null && for f in *; do [ -f "$f" ] && curl -s -X POST "$ALLURE_SERVER_URL/allure-docker-service/send-results?project_id=$PROJECT_ID" -F "files[]=@$f" >/dev/null; done' || true
    - sleep 2
    - curl -s -X GET "$ALLURE_SERVER_URL/allure-docker-service/generate-report?project_id=$PROJECT_ID"
    - echo "Report: http://${STAGING_HOST}:5252/#/projects/$PROJECT_ID"
  tags:
    - shell
  when: manual

# =============================================================================
# Jobs
# =============================================================================

pipeline-init:
  stage: init
  script:
    - echo "Warehouse Testing Pipeline ready!"
  tags:
    - shell

# E2E Tests
run-e2e-tests-staging:
  extends: .e2e-test-template
  variables:
    BASE_URL: "http://${STAGING_HOST}:${STAGING_API_PORT}"
    PROJECT_ID: "e2e-staging"
    TEST_ENV: "STAGING"
  environment:
    name: e2e-test-staging
    url: http://${STAGING_HOST}:${STAGING_API_PORT}

run-e2e-tests-prod:
  extends: .e2e-test-template
  variables:
    BASE_URL: "https://api.wh-lab.ru"
    PROJECT_ID: "e2e-prod"
    TEST_ENV: "PRODUCTION"
  environment:
    name: e2e-test-production
    url: https://api.wh-lab.ru

# UI Tests
run-ui-tests-staging:
  extends: .ui-test-template
  variables:
    BASE_URL: "http://${STAGING_HOST}:${STAGING_FRONTEND_PORT}"
    PROJECT_ID: "ui-staging"
    TEST_ENV: "STAGING"
  environment:
    name: ui-test-staging
    url: http://${STAGING_HOST}:${STAGING_FRONTEND_PORT}

run-ui-tests-prod:
  extends: .ui-test-template
  variables:
    BASE_URL: "https://wh-lab.ru"
    PROJECT_ID: "ui-prod"
    TEST_ENV: "PRODUCTION"
  environment:
    name: ui-test-production
    url: https://wh-lab.ru

# Load Tests
run-load-tests:
  stage: test
  variables:
    TARGET_HOST: "http://warehouse-api-service.warehouse.svc.cluster.local:8080"
    USERS: "100"
    SPAWN_RATE: "10"
    DURATION: "300"
  script:
    - echo "Starting Load Test..."
    - |
      curl -X POST "$LOCUST_MASTER_URL/swarm" \
        -d "user_count=$USERS&spawn_rate=$SPAWN_RATE&host=$TARGET_HOST"
      echo "Test running for ${DURATION}s..."
      sleep $DURATION
      curl -X GET "$LOCUST_MASTER_URL/stop"
      echo "Fetching results..."
      curl -s "$LOCUST_MASTER_URL/stats/requests" | jq '.stats[] | select(.name == "Aggregated")'
  tags:
    - shell
  when: manual

# Infrastructure
start-selenoid:
  stage: init
  script:
    - cd infrastructure/selenoid && docker-compose up -d
    - sleep 10
    - curl -s http://${STAGING_HOST}:4444/status | jq
  tags:
    - shell
  when: manual

start-allure:
  stage: init
  script:
    - cd infrastructure/allure && docker-compose up -d
    - sleep 10
    - curl -s http://${STAGING_HOST}:5050/allure-docker-service/version | jq
  tags:
    - shell
  when: manual
