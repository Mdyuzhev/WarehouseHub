# =============================================================================
# ServiceMonitor для warehouse-api
# Позволяет Prometheus Operator автоматически собирать метрики
# =============================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: warehouse-api-monitor
  namespace: monitoring
  labels:
    app: warehouse-api
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - warehouse
  selector:
    matchLabels:
      app: warehouse-api
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
