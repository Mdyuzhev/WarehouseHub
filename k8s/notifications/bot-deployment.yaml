apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-telegram-bot
  namespace: notifications
  labels:
    app: gitlab-telegram-bot
spec:
  # ВАЖНО: только 1 реплика для polling бота (409 Conflict)
  replicas: 1
  # Recreate strategy для избежания 409 при обновлениях
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab-telegram-bot
  template:
    metadata:
      labels:
        app: gitlab-telegram-bot
    spec:
      # Время на graceful shutdown (SIGTERM → SIGKILL)
      terminationGracePeriodSeconds: 15
      containers:
        - name: bot
          image: gitlab-telegram-bot:v5.5
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: telegram-bot-secrets
          env:
            # Logging
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_LEVEL
              value: "INFO"
            # WH-173: URLs вынесены в env для возможности переопределения
            - name: GITLAB_URL
              value: "http://192.168.1.74:8080"
            - name: ALLURE_SERVER_URL
              value: "http://192.168.1.74:5050"
            - name: ALLURE_PUBLIC_URL
              value: "https://advertiser-dark-remaining-sail.trycloudflare.com"
            - name: CLAUDE_PROXY_URL
              value: "http://192.168.1.74:8765"
            - name: YOUTRACK_URL
              value: "http://192.168.1.74:8088"
            - name: ROBOT_API_URL
              value: "http://warehouse-robot-service.warehouse.svc.cluster.local:8070"
            - name: PROD_HOST
              value: "130.193.44.34"
            # WH-217: Load Testing Workflow
            - name: COOLDOWN_MINUTES
              value: "30"
            - name: REDIS_STAGING_HOST
              value: "redis.warehouse.svc.cluster.local"
            - name: KAFKA_STAGING_BROKERS
              value: "kafka.warehouse.svc.cluster.local:9092"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
