apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-telegram-bot
  namespace: notifications
  labels:
    app: gitlab-telegram-bot
spec:
  # ВАЖНО: только 1 реплика для polling бота (409 Conflict)
  replicas: 1
  # Recreate strategy для избежания 409 при обновлениях
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab-telegram-bot
  template:
    metadata:
      labels:
        app: gitlab-telegram-bot
    spec:
      # Время на graceful shutdown (SIGTERM → SIGKILL)
      terminationGracePeriodSeconds: 15
      containers:
        - name: bot
          image: gitlab-telegram-bot:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: telegram-bot-secrets
          env:
            - name: CLAUDE_PROXY_URL
              value: "http://192.168.1.74:8765"
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
