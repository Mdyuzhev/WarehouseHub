# WH-218: RBAC для Telegram Bot — доступ к kubectl exec/apply
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegram-bot-sa
  namespace: notifications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: telegram-bot-role
rules:
  # Для cleanup: exec в pods Redis, Kafka, PostgreSQL
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
  # Для kubectl exec deploy/xxx — нужен доступ к deployments
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
  # Для k6: управление jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  # Для k6: logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Для k6-operator: TestRun CRD
  - apiGroups: ["k6.io"]
    resources: ["testruns"]
    verbs: ["get", "list", "create", "delete"]
  # Для k6: ConfigMap со скриптами
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: telegram-bot-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: telegram-bot-role
subjects:
  - kind: ServiceAccount
    name: telegram-bot-sa
    namespace: notifications
