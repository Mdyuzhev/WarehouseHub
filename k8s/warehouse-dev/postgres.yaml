# WH-195: PostgreSQL для dev-окружения
# Отдельная БД, изолированная от prod
#
# IMPORTANT: Secret is in separate file postgres-secret.yaml (not in git)
# Copy postgres-secret.yaml.example to postgres-secret.yaml and set passwords
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: warehouse-dev
  labels:
    app: postgres
    environment: development
data:
  init.sql: |
    -- Инициализация dev БД
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Создаём пользователя для приложения (пароль из env APP_DB_PASSWORD)
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'warehouse_app') THEN
        CREATE ROLE warehouse_app WITH LOGIN PASSWORD current_setting('app.db_password', true);
      END IF;
    END
    $$;

    -- Права на схему
    GRANT ALL PRIVILEGES ON DATABASE warehouse_dev TO warehouse_app;
    GRANT ALL PRIVILEGES ON SCHEMA public TO warehouse_app;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO warehouse_app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO warehouse_app;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: warehouse-dev
  labels:
    app: postgres
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      environment: development
  template:
    metadata:
      labels:
        app: postgres
        environment: development
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: APP_DB_NAME
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: postgres-data
          emptyDir: {}  # Dev не требует persistent storage
        - name: init-scripts
          configMap:
            name: postgres-init-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: warehouse-dev
  labels:
    app: postgres
    environment: development
spec:
  selector:
    app: postgres
    environment: development
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
  namespace: warehouse-dev
  labels:
    app: postgres
    environment: development
spec:
  selector:
    app: postgres
    environment: development
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 31432
      name: postgres
  type: NodePort
