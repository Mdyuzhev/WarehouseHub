# WH-194: ResourceQuota для dev-окружения
# Ограничивает ресурсы чтобы dev не мешал prod
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: warehouse-dev
  labels:
    environment: development
spec:
  hard:
    # CPU: максимум 2 ядра на весь namespace
    requests.cpu: "2"
    limits.cpu: "4"
    # Memory: максимум 4Gi на весь namespace
    requests.memory: 4Gi
    limits.memory: 8Gi
    # Максимум 10 подов
    pods: "10"
    # Максимум 10 сервисов
    services: "10"
    # Максимум 10 configmaps
    configmaps: "10"
    # Максимум 10 secrets
    secrets: "10"
    # Максимум 5 PVC
    persistentvolumeclaims: "5"
---
# LimitRange для дефолтных лимитов
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limits
  namespace: warehouse-dev
  labels:
    environment: development
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
