# WH-197: Warehouse Frontend для dev-окружения
# Указывает на dev API (31080)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: warehouse-dev
  labels:
    app: warehouse-frontend
    environment: development
data:
  # Nginx конфиг для dev (проксирует на dev API)
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Проверка здоровья
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Прокси на dev API
        location /api/ {
            proxy_pass http://warehouse-api-service:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Actuator endpoints
        location /actuator/ {
            proxy_pass http://warehouse-api-service:8080/actuator/;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-frontend
  namespace: warehouse-dev
  labels:
    app: warehouse-frontend
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-frontend
      environment: development
  template:
    metadata:
      labels:
        app: warehouse-frontend
        environment: development
    spec:
      containers:
        - name: frontend
          image: warehouse-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-frontend-service
  namespace: warehouse-dev
  labels:
    app: warehouse-frontend
    environment: development
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31081
      protocol: TCP
  selector:
    app: warehouse-frontend
    environment: development
