# =============================================================================
# ConfigMap для warehouse-api
# Содержит не-секретную конфигурацию приложения
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: warehouse-api-config
  namespace: warehouse
  labels:
    app: warehouse-api
    component: backend
data:
  # Spring профиль для Kubernetes
  SPRING_PROFILES_ACTIVE: "k8s"

  # Настройки сервера
  SERVER_PORT: "8080"

  # Настройки JPA
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_SHOW_SQL: "false"

  # Настройки логирования
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_WAREHOUSE: "DEBUG"
