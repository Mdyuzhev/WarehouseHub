# =============================================================================
# Prometheus NodePort Service for external access
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: prometheus-external
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
    prometheus: prometheus-kube-prometheus-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
