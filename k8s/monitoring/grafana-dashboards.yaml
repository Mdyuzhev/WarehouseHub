# =============================================================================
# Grafana Dashboards ConfigMap
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  warehouse-api.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list" } },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"warehouse-api\"}[5m]))",
              "legendFormat": "Requests/sec"
            }
          ],
          "title": "API Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_sum{application=\"warehouse-api\"}[5m])) / sum(rate(http_server_requests_seconds_count{application=\"warehouse-api\"}[5m]))",
              "legendFormat": "Avg Latency"
            },
            {
              "expr": "max(rate(http_server_requests_seconds_sum{application=\"warehouse-api\"}[5m]) / rate(http_server_requests_seconds_count{application=\"warehouse-api\"}[5m]))",
              "legendFormat": "Max Avg Latency"
            }
          ],
          "title": "API Response Time",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "id": 3,
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"warehouse-api\",status=~\"5..\"}[5m]))",
              "legendFormat": "5xx Errors"
            },
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"warehouse-api\",status=~\"4..\"}[5m]))",
              "legendFormat": "4xx Errors"
            }
          ],
          "title": "Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "id": 4,
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{application=\"warehouse-api\",area=\"heap\"}",
              "legendFormat": "Heap Used"
            },
            {
              "expr": "jvm_memory_max_bytes{application=\"warehouse-api\",area=\"heap\"}",
              "legendFormat": "Heap Max"
            }
          ],
          "title": "JVM Memory",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "id": 5,
          "targets": [
            {
              "expr": "warehouse_products_created_total",
              "legendFormat": "Products Created"
            },
            {
              "expr": "warehouse_products_deleted_total",
              "legendFormat": "Products Deleted"
            }
          ],
          "title": "Business Metrics",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 6,
          "targets": [
            {
              "expr": "hikaricp_connections_active{application=\"warehouse-api\"}",
              "legendFormat": "Active Connections"
            },
            {
              "expr": "hikaricp_connections_idle{application=\"warehouse-api\"}",
              "legendFormat": "Idle Connections"
            }
          ],
          "title": "Database Connections",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 7,
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "value": 0, "color": "red" }, { "value": 1, "color": "green" }] }
            }
          },
          "targets": [
            {
              "expr": "up{job=\"warehouse-api-service\"}",
              "legendFormat": "API"
            }
          ],
          "title": "Service Health",
          "type": "stat"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["warehouse", "api"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Warehouse API",
      "uid": "warehouse-api",
      "version": 1
    }
