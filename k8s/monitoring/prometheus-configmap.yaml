# =============================================================================
# ConfigMap для Prometheus конфигурации
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Prometheus сам себя
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Warehouse API через ServiceMonitor
      - job_name: 'warehouse-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - warehouse
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app]
            action: keep
            regex: warehouse-api
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
        metrics_path: /actuator/prometheus
        scrape_interval: 15s

      # Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Production API (external)
      - job_name: 'warehouse-api-production'
        static_configs:
          - targets: ['api.wh-lab.ru:443']
            labels:
              environment: 'production'
        scheme: https
        metrics_path: /actuator/prometheus
        scrape_interval: 30s

      # Frontend Nginx (staging)
      - job_name: 'warehouse-frontend-staging'
        static_configs:
          - targets: ['warehouse-frontend.warehouse.svc.cluster.local:80']
            labels:
              environment: 'staging'
        metrics_path: /stub_status
        scrape_interval: 15s
