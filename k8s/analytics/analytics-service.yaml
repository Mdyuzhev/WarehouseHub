# =============================================================================
# Analytics Service - Kubernetes Service
# WH-121: Real-time Kafka Analytics Dashboard
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: warehouse
  labels:
    app: analytics-service
    component: analytics
spec:
  type: NodePort
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30091
      protocol: TCP
      name: http
  selector:
    app: analytics-service
