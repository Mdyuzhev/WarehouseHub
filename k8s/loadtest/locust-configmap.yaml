# =============================================================================
# ConfigMap для Locust - содержит locustfile.py
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-script
  namespace: loadtest
  labels:
    app: locust
data:
  locustfile.py: |
    """
    Сценарий нагрузочного тестирования для Warehouse API
    """
    import random
    import string
    import time
    from locust import HttpUser, task, between, LoadTestShape

    class WarehouseUser(HttpUser):
        wait_time = between(1, 3)
        username = None
        password = None
        role = None
        abstract = True

        def on_start(self):
            self.token = None
            self.created_product_ids = []
            self.login_with_retry()

        def on_stop(self):
            for product_id in self.created_product_ids:
                try:
                    self.client.delete(
                        f"/api/products/{product_id}",
                        headers=self.auth_headers(),
                        name="/api/products/[id] (cleanup)"
                    )
                except:
                    pass

        def login_with_retry(self, max_retries=3):
            for attempt in range(max_retries):
                try:
                    response = self.client.post(
                        "/api/auth/login",
                        json={"username": self.username, "password": self.password},
                        name="/api/auth/login"
                    )
                    if response.status_code == 200:
                        data = response.json()
                        self.token = data.get("token")
                        if self.token:
                            return True
                except:
                    pass
                time.sleep(0.5 * (attempt + 1))
            return False

        def ensure_logged_in(self):
            if not self.token:
                self.login_with_retry()
            return self.token is not None

        def auth_headers(self):
            if self.token:
                return {"Authorization": f"Bearer {self.token}"}
            return {}

        def generate_product_name(self):
            suffix = "".join(random.choices(string.ascii_lowercase + string.digits, k=8))
            return f"LoadTest-{self.role}-{suffix}"

        @task(5)
        def view_products(self):
            if not self.ensure_logged_in():
                return
            self.client.get("/api/products", headers=self.auth_headers(), name="/api/products (GET)")

        @task(1)
        def view_current_user(self):
            if not self.ensure_logged_in():
                return
            self.client.get("/api/auth/me", headers=self.auth_headers(), name="/api/auth/me")

    class EmployeeUser(WarehouseUser):
        weight = 7
        username = "employee"
        password = "employee123"
        role = "employee"
        abstract = False

        @task(3)
        def create_product(self):
            if not self.ensure_logged_in():
                return
            product_name = self.generate_product_name()
            response = self.client.post(
                "/api/products",
                json={"name": product_name, "quantity": random.randint(1, 100), "price": round(random.uniform(10.0, 500.0), 2)},
                headers=self.auth_headers(),
                name="/api/products (POST)"
            )
            if response.status_code in [200, 201]:
                try:
                    product_id = response.json().get("id")
                    if product_id:
                        self.created_product_ids.append(product_id)
                except:
                    pass

        @task(2)
        def delete_own_product(self):
            if not self.ensure_logged_in():
                return
            if self.created_product_ids:
                product_id = self.created_product_ids.pop()
                self.client.delete(f"/api/products/{product_id}", headers=self.auth_headers(), name="/api/products/[id] (DELETE)")

    class ManagerUser(WarehouseUser):
        weight = 3
        username = "manager"
        password = "manager123"
        role = "manager"
        abstract = False

        @task(3)
        def view_products_detailed(self):
            if not self.ensure_logged_in():
                return
            self.client.get("/api/products", headers=self.auth_headers(), name="/api/products (GET)")

    class LinearLoadShape(LoadTestShape):
        target_users = 100
        ramp_time = 600
        hold_time = 300
        spawn_rate = 10

        def tick(self):
            run_time = self.get_run_time()
            total_time = self.ramp_time + self.hold_time
            if run_time > total_time:
                return None
            if run_time < self.ramp_time:
                current_users = int((run_time / self.ramp_time) * self.target_users)
                return (max(1, current_users), self.spawn_rate)
            else:
                return (self.target_users, self.spawn_rate)
