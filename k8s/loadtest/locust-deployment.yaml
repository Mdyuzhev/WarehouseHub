# =============================================================================
# Deployment для Locust Master
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: loadtest
  labels:
    app: locust
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
      role: master
  template:
    metadata:
      labels:
        app: locust
        role: master
    spec:
      containers:
        - name: locust
          image: locustio/locust:2.20.0
          args:
            - "--master"
            - "-f"
            - "/mnt/locust/locustfile.py"
          ports:
            - containerPort: 8089
              name: web
            - containerPort: 5557
              name: master
            - containerPort: 5558
              name: master-bind
          volumeMounts:
            - name: locust-script
              mountPath: /mnt/locust
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: locust-script
          configMap:
            name: locust-script

---
# =============================================================================
# Deployment для Locust Workers
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  namespace: loadtest
  labels:
    app: locust
    role: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locust
      role: worker
  template:
    metadata:
      labels:
        app: locust
        role: worker
    spec:
      containers:
        - name: locust
          image: locustio/locust:2.20.0
          args:
            - "--worker"
            - "--master-host=locust-master-service"
            - "-f"
            - "/mnt/locust/locustfile.py"
          volumeMounts:
            - name: locust-script
              mountPath: /mnt/locust
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: locust-script
          configMap:
            name: locust-script
