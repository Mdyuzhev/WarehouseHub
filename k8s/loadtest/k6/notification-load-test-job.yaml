apiVersion: batch/v1
kind: Job
metadata:
  name: notification-load-test
  namespace: loadtest
  labels:
    app: k6
    test-type: notification
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: k6
        test-type: notification
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /scripts/notification-load-test.js
          env:
            - name: BASE_URL
              value: "http://warehouse-api-service.warehouse-dev.svc.cluster.local:8080"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: scripts
          configMap:
            name: k6-notification-scripts
