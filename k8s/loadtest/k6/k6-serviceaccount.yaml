# ServiceAccount и RBAC для k6 runner
# WH-209
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k6-runner
  namespace: loadtest
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k6-runner-role
  namespace: loadtest
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k6-runner-binding
  namespace: loadtest
subjects:
  - kind: ServiceAccount
    name: k6-runner
    namespace: loadtest
roleRef:
  kind: Role
  name: k6-runner-role
  apiGroup: rbac.authorization.k8s.io
