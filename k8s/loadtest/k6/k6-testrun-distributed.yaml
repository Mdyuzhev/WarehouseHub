# TestRun для k6-operator: распределённый тест 300 VU на 6 воркерах
# WH-217
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: kafka-distributed-300vu
  namespace: loadtest
spec:
  # Количество параллельных воркеров (pods)
  parallelism: 6

  # Скрипт из ConfigMap
  script:
    configMap:
      name: k6-scripts
      file: distributed-300vu.js

  # Кастомный образ с xk6-kafka
  runner:
    image: k6-kafka:latest
    imagePullPolicy: Never
    resources:
      requests:
        cpu: "1"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
    env:
      - name: KAFKA_BROKERS
        value: "kafka.warehouse.svc.cluster.local:9092"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      - name: K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM
        value: "true"

  # Аргументы для k6 (output в Prometheus)
  arguments: --out experimental-prometheus-rw
