# =============================================================================
# Deployment для warehouse-frontend
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-frontend
  namespace: warehouse
  labels:
    app: warehouse-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: warehouse-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: warehouse-frontend
        component: frontend
    spec:
      containers:
        - name: frontend
          image: warehouse-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          startupProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
