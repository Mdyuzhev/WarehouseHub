# PostgreSQL Backup CronJob
# Runs daily at 3:00 AM, keeps 7 days of backups
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: warehouse
  labels:
    app: postgres-backup
spec:
  schedule: "0 3 * * *"  # Daily at 3:00 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400  # Clean up job after 24 hours
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:15-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: "postgres-service.warehouse.svc.cluster.local"
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: APP_DB_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: APP_DB_PASSWORD
                - name: PGDATABASE
                  value: "warehouse"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  DATE=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/warehouse_${DATE}.sql.gz"

                  echo "Starting backup at $(date)"
                  pg_dump --no-owner --no-acl | gzip > "$BACKUP_FILE"

                  # Verify backup
                  if [ -s "$BACKUP_FILE" ]; then
                    SIZE=$(ls -lh "$BACKUP_FILE" | awk '{print $5}')
                    echo "Backup created: $BACKUP_FILE ($SIZE)"
                  else
                    echo "ERROR: Backup failed"
                    exit 1
                  fi

                  # Cleanup old backups (keep 7 days)
                  find /backups -name "warehouse_*.sql.gz" -mtime +7 -delete
                  echo "Cleanup complete"

                  # List current backups
                  echo "Current backups:"
                  ls -lh /backups/
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
---
# PVC for storing backups
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: warehouse
  labels:
    app: postgres-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
