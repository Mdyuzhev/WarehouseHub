# =============================================================================
# Redis ConfigMap для warehouse
# Конфигурация Redis для staging/production
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: warehouse
  labels:
    app: redis
    component: cache
data:
  redis.conf: |
    # Memory management
    maxmemory 200mb
    maxmemory-policy allkeys-lru

    # Persistence (RDB snapshots)
    save 900 1
    save 300 10
    save 60 10000

    # Append Only File (более надежно)
    appendonly yes
    appendfsync everysec

    # Network
    bind 0.0.0.0
    protected-mode no
    timeout 0
    tcp-keepalive 300

    # Logging
    loglevel notice

    # Limits
    maxclients 1000
