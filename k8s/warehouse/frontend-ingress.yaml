# =============================================================================
# Ingress для warehouse (Traefik)
# Маршрутизация:
#   warehouse.local/ -> frontend
#   warehouse.local/api -> backend
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: warehouse-ingress
  namespace: warehouse
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: warehouse.local
      http:
        paths:
          # API Backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: warehouse-api-service
                port:
                  number: 8080

          # Actuator endpoints (health, etc.)
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: warehouse-api-service
                port:
                  number: 8080

          # Frontend (всё остальное)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: warehouse-frontend-service
                port:
                  number: 80
