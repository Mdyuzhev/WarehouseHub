# =============================================================================
# Secret для warehouse-api
# Содержит секретные ключи приложения
# =============================================================================
# ВАЖНО: В production используйте External Secrets или Sealed Secrets!
# Значения ниже - placeholders, замените на реальные перед деплоем.

apiVersion: v1
kind: Secret
metadata:
  name: warehouse-api-secrets
  namespace: warehouse
  labels:
    app: warehouse-api
    component: backend
type: Opaque
stringData:
  # JWT секрет для подписи токенов (замените на сгенерированный ключ!)
  JWT_SECRET: "${JWT_SECRET_PLACEHOLDER}"
