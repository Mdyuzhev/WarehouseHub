# =============================================================================
# Service для warehouse-frontend
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: warehouse-frontend-service
  namespace: warehouse
  labels:
    app: warehouse-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: warehouse-frontend
