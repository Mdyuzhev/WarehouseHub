# =============================================================================
# Selenoid Deployment для UI-тестов
# Selenoid - легковесный Selenium Grid на Docker/K8s
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenoid
  namespace: warehouse
  labels:
    app: selenoid
    component: testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenoid
  template:
    metadata:
      labels:
        app: selenoid
        component: testing
    spec:
      containers:
        - name: selenoid
          image: aerokube/selenoid:1.11.2
          ports:
            - containerPort: 4444
              name: http
          args:
            - "-conf"
            - "/etc/selenoid/browsers.json"
            - "-limit"
            - "4"
            - "-video-output-dir"
            - "/opt/selenoid/video"
            - "-log-output-dir"
            - "/opt/selenoid/logs"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: browsers-config
              mountPath: /etc/selenoid
            - name: docker-socket
              mountPath: /var/run/docker.sock
          livenessProbe:
            httpGet:
              path: /status
              port: 4444
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /status
              port: 4444
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: browsers-config
          configMap:
            name: selenoid-browsers
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
