# =============================================================================
# Kafka ConfigMap для warehouse
# Содержит cluster-id и другие конфигурационные данные
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: warehouse
  labels:
    app: kafka
    component: messaging
data:
  # Cluster ID для KRaft mode (сгенерирован один раз)
  # Для генерации нового: kafka-storage.sh random-uuid
  cluster-id: "WH-warehouse-kafka-001"
