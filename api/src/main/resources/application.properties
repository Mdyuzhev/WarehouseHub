# =============================================================================
# Warehouse API Configuration
# =============================================================================

spring.application.name=warehouse-api
server.port=8080

# =============================================================================
# PostgreSQL Configuration
# =============================================================================
# Для локальной разработки (через NodePort):
spring.datasource.url=jdbc:postgresql://192.168.1.74:30432/warehouse

# Для Kubernetes (через ClusterIP) — будет переопределено в K8s:
# spring.datasource.url=jdbc:postgresql://postgres-service.warehouse.svc.cluster.local:5432/warehouse

spring.datasource.username=${DB_USERNAME:warehouse_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# JPA/Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# Flyway Database Migration
# =============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =============================================================================
# Swagger/OpenAPI
# =============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =============================================================================
# Actuator (для K8s health probes)
# =============================================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics,mappings,beans
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# =============================================================================
# Metrics Configuration
# =============================================================================
management.metrics.tags.application=warehouse-api
management.metrics.tags.environment=development

# Enable JVM metrics
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.http=true

# Database pool metrics
management.metrics.enable.hikaricp=true

# =============================================================================
# Logging (debug)
# =============================================================================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.warehouse=DEBUG

# =============================================================================
# JWT Configuration
# =============================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =============================================================================
# CORS Configuration
# =============================================================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://192.168.1.74:30000,http://192.168.1.74:30081,http://warehouse.local,https://wh-lab.ru,https://www.wh-lab.ru

# =============================================================================
# Redis Cache (для локальной разработки отключен)
# =============================================================================
# spring.cache.type=redis  # раскомментировать если Redis доступен локально

# =============================================================================
# Notification Service
# =============================================================================
notification.queue.batch-size=50
notification.queue.poll-interval=5000
notification.queue.max-retries=3

# Telegram Notification (override via env vars)
notification.telegram.enabled=${NOTIFICATION_TELEGRAM_ENABLED:false}
notification.telegram.bot-token=${NOTIFICATION_TELEGRAM_BOT_TOKEN:}
notification.telegram.default-chat-id=${NOTIFICATION_TELEGRAM_DEFAULT_CHAT_ID:}
