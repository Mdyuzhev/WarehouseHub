# =============================================================================
# CI Pipeline для warehouse-api
# Сборка, публикация образа и деплой в dev/prod окружения
# =============================================================================

stages:
  - validate
  - build
  - test
  - package
  - deploy

# =============================================================================
# Переменные
# =============================================================================
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  IMAGE_NAME: "warehouse-api"
  YC_REGISTRY: "cr.yandex/crpf5fukf1ili7kudopb"
  # K8s config для деплоя
  KUBECONFIG: "/home/flomaster/.kube/config"
  # Dev environment (warehouse-dev namespace, порты 31xxx)
  DEV_NAMESPACE: "warehouse-dev"
  DEV_API_URL: "http://192.168.1.74:31080"
  # Prod environment (warehouse namespace, порты 30xxx)
  PROD_NAMESPACE: "warehouse"
  PROD_API_URL: "http://192.168.1.74:30080"

# =============================================================================
# Кэширование Maven зависимостей
# =============================================================================
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/
    - target/

# =============================================================================
# Stage: validate
# =============================================================================
validate-project:
  stage: validate
  script:
    - echo "🔍 Validating project structure..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw validate --batch-mode
  tags:
    - shell

# =============================================================================
# Stage: build
# =============================================================================
build-project:
  stage: build
  script:
    - echo "🔨 Building application..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw compile --batch-mode
  artifacts:
    paths:
      - target/classes/
    expire_in: 1 hour
  tags:
    - shell

# =============================================================================
# Stage: test (Unit tests only)
# =============================================================================
test-project:
  stage: test
  script:
    - echo "🧪 Running unit tests..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw test --batch-mode -Dtest="!*E2E*"
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
    expire_in: 1 week
  tags:
    - shell

# =============================================================================
# Stage: package
# Сборка Docker образа и push в Yandex Registry
# =============================================================================
package-image:
  stage: package
  script:
    - echo "📦 Building JAR..."
    - chmod +x ./mvnw
    - LD_PRELOAD= ./mvnw package -DskipTests --batch-mode

    - echo "🐳 Building Docker image..."
    - docker build --no-cache -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $IMAGE_NAME:latest

    - echo "📤 Pushing to Yandex Container Registry..."
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $YC_REGISTRY/$IMAGE_NAME:latest
    - cat /home/flomaster/secrets/yc-registry-key.json | docker login --username json_key --password-stdin cr.yandex
    - docker push $YC_REGISTRY/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $YC_REGISTRY/$IMAGE_NAME:latest

    - echo "📦 Importing to K3s..."
    - docker save $IMAGE_NAME:latest -o /tmp/$IMAGE_NAME.tar
    - sudo k3s ctr images rm docker.io/library/$IMAGE_NAME:latest || true
    - sudo k3s ctr images import /tmp/$IMAGE_NAME.tar
    - sudo rm -f /tmp/$IMAGE_NAME.tar || true

    - echo "✅ Image ready for deployment"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  tags:
    - shell

# =============================================================================
# Stage: deploy
# Деплой в dev (автоматически) и prod (ручной триггер)
# =============================================================================

# Автоматический деплой в dev-окружение при пуше в develop
deploy-dev:
  stage: deploy
  script:
    - echo "Deploying API to DEV environment..."
    - echo "Namespace - $DEV_NAMESPACE"
    - kubectl rollout restart deployment/warehouse-api -n $DEV_NAMESPACE
    - kubectl rollout status deployment/warehouse-api -n $DEV_NAMESPACE --timeout=120s
    - echo "Checking health..."
    - sleep 10
    - curl -sf "$DEV_API_URL/actuator/health" && echo "Health check passed" || echo "Health check warning"
    - echo "DEV URL - $DEV_API_URL"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  environment:
    name: development
    url: $DEV_API_URL
  tags:
    - shell
  dependencies:
    - package-image

# Ручной деплой в prod-окружение при пуше в main
deploy-prod:
  stage: deploy
  script:
    - echo "Deploying API to PRODUCTION environment..."
    - echo "Namespace - $PROD_NAMESPACE"
    - kubectl rollout restart deployment/warehouse-api -n $PROD_NAMESPACE
    - kubectl rollout status deployment/warehouse-api -n $PROD_NAMESPACE --timeout=120s
    - echo "Checking health..."
    - sleep 10
    - curl -sf "$PROD_API_URL/actuator/health" && echo "Health check passed" || echo "Health check warning"
    - echo "PROD URL - $PROD_API_URL"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: $PROD_API_URL
  tags:
    - shell
  dependencies:
    - package-image
