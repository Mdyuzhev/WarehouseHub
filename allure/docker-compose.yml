# =============================================================================
# Allure Report Server - Единое хранилище отчётов
# =============================================================================
#
# Проекты:
#   - warehouse-api     : E2E тесты API (Java/Spring)
#   - warehouse-ui-staging : UI тесты для staging
#   - warehouse-ui-prod    : UI тесты для production
#
# Использование:
#   cd allure && docker-compose up -d
#
# UI: http://192.168.1.74:5252
# API: http://192.168.1.74:5050/allure-docker-service
# =============================================================================

version: "3.8"

services:
  allure-server:
    image: frankescobar/allure-docker-service:2.21.0
    container_name: allure-server
    ports:
      - "5050:5050"
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 5
      KEEP_HISTORY: 25
      KEEP_HISTORY_LATEST: 10
    volumes:
      - allure-results:/app/allure-results
      - allure-reports:/app/default-reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/allure-docker-service/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  allure-ui:
    image: frankescobar/allure-docker-service-ui:7.0.3
    container_name: allure-ui
    ports:
      - "5252:5252"
    environment:
      ALLURE_DOCKER_PUBLIC_API_URL: "http://192.168.1.74:5050"
      ALLURE_DOCKER_PUBLIC_API_URL_PREFIX: "/allure-docker-service"
    depends_on:
      - allure-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5252"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  allure-results:
  allure-reports:
